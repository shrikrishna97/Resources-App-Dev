title: "App Development Resources"
description: "A comprehensive collection of resources for App Development courses (MAD-1 & MAD-2)"
theme: jekyll-theme-cayman
baseurl: "/Resources-App-Dev"
url: "https://shrikrishna97.github.io"

markdown: GFM

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "App-Dev-1"
    values:
      render_with_liquid: false
      layout: "default"
  - scope:
      path: "App-Dev-1-Project"
    values:
      render_with_liquid: false
      layout: "default"
  - scope:
      path: "App-Dev-2"
    values:
      render_with_liquid: false
      layout: "default"
  - scope:
      path: "App-Dev-2-Project"
    values:
      render_with_liquid: false
      layout: "default"

exclude:
  - .hintrc
  - LICENSE
  - README.md
