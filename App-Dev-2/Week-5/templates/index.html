<!Doctype html>
<html>
  <head>
    <title>Week 5</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app" class="container mt-4">
      <h2>My Notes {{ name }}</h2>
      <div v-for="note in notes" class="card mt-3">
        <div class="card-body">
          <h5>{{ note.title }}</h5>
          <p>{{ note.content }}</p>
          <p>ID: {{ note.id }}</p>
        </div>
      </div>
    </div>
    <script>
      new Vue({
        el: "#app",
        data: {
          name: "John",
          notes: [],
        },
        methods: {
          fetchNotes: function () {
            fetch("http://127.0.0.1:5000/api/data")
              .then((response) => response.json())
              .then((data) => {
                this.notes = data;
                console.log("Fetched notes:", this.notes);
              });
          },

          addNotes: function () {
            fetch("http://127.0.0.1:5000/api/data", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    id: 3,
                    title: "New Note",
                    content: "This is a new note.",
                })
                }
            ).then((response) => response.json()).then((data) => {
                console.log("Added note:", data);
                this.fetchNotes(); // Refresh the notes after adding
            });
          }
        },
        mounted: function () {
          this.fetchNotes();
          this.addNotes(); // Call addNotes to add a new note when the component is mounted
        },
      });
    </script>
  </body>
</html>
