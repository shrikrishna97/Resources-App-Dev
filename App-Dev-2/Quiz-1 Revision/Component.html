<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Vue 2 Component Demo</title>
		<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
	</head>
	<body>
		<div id="app">
			<h2>Student Card</h2>

			<child v-if="student" :name="student" @remove="deleteStudent"></child>
			<p v-else>No student available</p>
		</div>

		<script src="./Component.js"></script>
	</body>
</html>

Delete -> $emit -> remove -> @remove -> parent function ( deleteStudent) -> this.student = null -> this.student is coming from parent -> binded by props "name"
