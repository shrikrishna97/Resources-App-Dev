<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo 06 - v-if vs v-show</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; }
    .box { border: 1px solid #ccc; border-radius: 8px; padding: 12px; margin-top: 12px; }
    .if-box { background: #e8f5e9; }
    .show-box { background: #fff8e1; }
    button { padding: 8px 12px; }
  </style>
</head>
<body>
  <h2>Section 6 Demo: v-if and v-show</h2>
  <p>Toggle once and inspect element in DevTools.</p>

  <div id="app">
    <button @click="togglePanel">Toggle</button>
    <p><strong>isVisible:</strong> {{ isVisible }}</p>

    <div class="box if-box" v-if="isVisible">
      This box uses v-if (removed from DOM when false)
    </div>

    <div class="box show-box" v-show="isVisible">
      This box uses v-show (stays in DOM, display:none when false)
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: { isVisible: true },
      methods: {
        togglePanel: function () {
          this.isVisible = !this.isVisible;
        }
      }
    });
  </script>
</body>
</html>
